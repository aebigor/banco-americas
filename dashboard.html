<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <link rel="stylesheet" href="styles1.css">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<!-- HEADER -->
<div class="header">
    <h2 id="saludo"></h2>
    <p>Clave Dinámica</p>
</div>

<div class="logout">
    <button onclick="cerrarSesion()">Cerrar Sesión</button>
</div>

<!-- CUENTA -->
<div class="card">
    <h3 class="green">Cuenta Ahorros</h3>
    <h2 id="saldo"></h2>
    <p id="numCuenta"></p>
    <p id="tipoCuenta"></p>

    <div class="botones">
        <button onclick="bloqueado()">Ver Saldos</button>
        <button onclick="mostrarTransferencia()">Transferir Dinero</button>
        <button onclick="bloqueado()">Retirar Dinero</button>
        <button onclick="mostrarSolicitud()">Solicitar Dinero</button>
        <button onclick="bloqueado()">Pagar Créditos</button>
        <button onclick="bloqueado()">Conoce más de tu cuenta</button>
    </div>
</div>
<div class="card" id="solicitudBox" style="display: none;">
    <h3>Solicitar Dinero</h3>

    <input type="text" id="usuarioSolicitud" placeholder="Usuario">
    <input type="number" id="montoSolicitud" placeholder="Monto">

    <button onclick="solicitar()">Solicitar</button>
</div>

<div class="card" id="transferenciaBox" style="display: none;">
    <h3>Transferir Dinero</h3>

    <input type="text" id="destino" placeholder="Usuario destino">
    <input type="number" id="monto" placeholder="Monto">

    <button onclick="transferir()">Enviar</button>
</div>

<!-- INFO PERSONAL -->
<div class="card">
    <h3 class="green">Información Personal</h3>
    <p id="direccion"></p>
    <p id="correo"></p>
    <p id="residencia"></p>
    <p id="estadoCivil"></p>
    <p id="personas"></p>
    <p id="trabajo"></p>
    <p id="salario"></p>
    <p id="gastos"></p>
    <p id="deudas"></p>
    <p id="inversiones"></p>
</div>

<!-- GRAFICA -->
<div class="card">
    <h3 class="green">Resumen de Movimientos</h3>
    <canvas id="grafica"></canvas>
</div>

<!-- IMAGEN FINAL -->
<div class="card">
    <img src="https://images.unsplash.com/photo-1563013544-824ae1b704d3" class="img-final">
</div>

<!-- WHATSAPP -->
<a href="#" class="whatsapp" onclick="bloqueado()">💬</a>

<!-- FOOTER -->
<div class="footer">
    <div onclick="bloqueado()">🏠<span>Inicio</span></div>
    <div onclick="bloqueado()">💳<span>Transacciones</span></div>
    <div onclick="bloqueado()">📂<span>Explorar</span></div>
    <div onclick="bloqueado()">📄<span>Trámites</span></div>
    <div onclick="bloqueado()">⚙️<span>Ajustes</span></div>
</div>

<script>
let user = JSON.parse(localStorage.getItem("usuarioActivo"));

// 🔒 Validar si no hay sesión
if(!user){
    alert("No hay sesión activa");
    window.location.href = "index.html";
}

// SALUDO
document.getElementById("saludo").innerText = "Hola, " + user.usuario;

// SALDO
document.getElementById("saldo").innerText =
    "Saldo disponible: " + user.saldo.toLocaleString() + " US$";

// DATOS CUENTA
document.getElementById("numCuenta").innerText =
    "Número de Cuenta: " + user.numeroCuenta;

document.getElementById("tipoCuenta").innerText =
    "Tipo de Cuenta: " + user.tipoCuenta;

// INFO PERSONAL
document.getElementById("direccion").innerText = "Dirección: " + user.direccion;
document.getElementById("correo").innerText = "Correo: " + user.correo;
document.getElementById("residencia").innerText = "Tiempo de residencia: " + user.residencia;
document.getElementById("estadoCivil").innerText = "Estado civil: " + user.estadoCivil;
document.getElementById("personas").innerText = "Personas a cargo: " + user.personas;
document.getElementById("trabajo").innerText = "Trabajo actual: " + user.trabajo;

document.getElementById("salario").innerText =
    "Salario mensual: " + user.salario + " US$";

document.getElementById("gastos").innerText =
    "Gastos mensuales: " + user.gastos + " US$";

document.getElementById("deudas").innerText =
    "Deudas: " + user.deudas + " US$";

document.getElementById("inversiones").innerText =
    "Inversiones: " + user.inversiones + " US$";
</script>
<script>

// LOGOUT
function cerrarSesion() {
    localStorage.removeItem("usuarioActivo");
    window.location.href = "index.html";
}

// MENSAJE BLOQUEADO
function bloqueado(){
    alert("Esta cuenta se encuentra congelada, hasta que no realice los pagos pertinentes.");
}

// GRAFICA
const ctx = document.getElementById('grafica');

new Chart(ctx, {
    type: 'bar',
    data: {
        labels: ['Consignaciones', 'Créditos', 'Pagos'],
        datasets: [{
            label: 'Dólares ($)',
            data: [1200000, 0, 0]
        }]
    }
});
</script>

<script>
function transferir(){
    let destino = document.getElementById("destino").value.trim();
    let monto = parseFloat(document.getElementById("monto").value);

    let usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];
    let actual = JSON.parse(localStorage.getItem("usuarioActivo"));

    if(!destino || isNaN(monto) || monto <= 0){
        alert("Datos inválidos");
        return;
    }

    let indexOrigen = usuarios.findIndex(u => u.usuario === actual.usuario);
    let indexDestino = usuarios.findIndex(u => u.usuario === destino);

    if(indexOrigen === -1){
        alert("Error usuario");
        return;
    }

    if(indexDestino === -1){
        alert("Usuario destino no existe");
        return;
    }

    if(usuarios[indexOrigen].saldo < monto){
        alert("Fondos insuficientes");
        return;
    }

    // 🔥 DESCONTAR BIEN
    usuarios[indexOrigen].saldo -= monto;

    // (opcional) sumar al destino
    usuarios[indexDestino].saldo += monto;

    // guardar
    localStorage.setItem("usuarios", JSON.stringify(usuarios));
    localStorage.setItem("usuarioActivo", JSON.stringify(usuarios[indexOrigen]));

    // actualizar pantalla
    document.getElementById("saldo").innerText =
        "Saldo disponible: " + usuarios[indexOrigen].saldo.toLocaleString() + " US$";

    // ocultar form
    document.getElementById("transferenciaBox").style.display = "none";

    // limpiar
    document.getElementById("monto").value = "";
    document.getElementById("destino").value = "";

    alert("Transferencia exitosa");
}
</script>


<script>
function mostrarTransferencia(){
    let box = document.getElementById("transferenciaBox");

    if(box.style.display === "none"){
        box.style.display = "block";
        box.scrollIntoView({ behavior: "smooth" });
    } else {
        box.style.display = "none";
    }
}


function mostrarSolicitud(){
    let box = document.getElementById("solicitudBox");

    box.style.display = box.style.display === "none" ? "block" : "none";
}

function solicitar(){
    let monto = parseFloat(document.getElementById("montoSolicitud").value);

    if(isNaN(monto) || monto <= 0){
        alert("Monto inválido");
        return;
    }

    alert("Solicitud enviada... recibirás el dinero en unos segundos");

    document.getElementById("solicitudBox").style.display = "none";
    document.getElementById("montoSolicitud").value = "";

    setTimeout(() => {

        let usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];
        let activo = JSON.parse(localStorage.getItem("usuarioActivo"));

        if(!activo){
            alert("Sesión perdida");
            return;
        }

        let index = usuarios.findIndex(u => u.usuario === activo.usuario);

        if(index === -1){
            alert("Usuario no encontrado");
            return;
        }

        // 🔥 SUMAR CORRECTO
        usuarios[index].saldo += monto;

        localStorage.setItem("usuarios", JSON.stringify(usuarios));
        localStorage.setItem("usuarioActivo", JSON.stringify(usuarios[index]));

        document.getElementById("saldo").innerText =
            "Saldo disponible: " + usuarios[index].saldo.toLocaleString() + " US$";

        alert("Dinero recibido correctamente");

    }, 3000); // luego cambias a 180000
}
</script>


</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="login-container">
    <h2>Iniciar Sesión</h2>

    <form id="loginForm">
        <label>Nombre de Usuario</label>
        <input type="text" id="usuario" required>

        <label>Contraseña</label>
        <input type="password" id="password" required>

        <button type="submit">Ingresar</button>
    </form>
</div>
<script>

// =====================================
// CREAR USUARIO AUTOMÁTICO
// =====================================

let usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];

// verificar si existe
let existe = usuarios.find(u => u.usuario === "Andres");

if(!existe){

    usuarios.push({
        usuario: "Andres",
        password: "1234",

        saldo: 200000,

        numeroCuenta: "4589632147",
        tipoCuenta: "Ahorros",

        direccion: "Bogotá",
        correo: "Andres@gmail.com",
        residencia: "5 años",
        estadoCivil: "Soltero",
        personas: "0",
        trabajo: "Empresario",

        salario: 12000,
        gastos: 3000,
        deudas: 1000,
        inversiones: 5000
    });

    localStorage.setItem("usuarios", JSON.stringify(usuarios));
}

// =====================================
// LOGIN
// =====================================

document.getElementById("loginForm").addEventListener("submit", function(e){

    e.preventDefault();

    let user = document.getElementById("usuario").value.trim();
    let pass = document.getElementById("password").value.trim();

    let usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];

    let encontrado = usuarios.find(
        u => u.usuario === user && u.password === pass
    );

    if(encontrado){

        localStorage.setItem(
            "usuarioActivo",
            JSON.stringify(encontrado)
        );

        window.location.href = "dashboard.html";

    } else {

        alert("Usuario incorrecto");
    }
});

</script>
<script>

        window.location.href = "dashboard.html";

    }

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="login-container">
    <h2>Iniciar Sesión</h2>

    <form id="loginForm">
        <label>Nombre de Usuario</label>
        <input type="text" id="usuario" required>

        <label>Contraseña</label>
        <input type="password" id="password" required>

        <button type="submit">Ingresar</button>
    </form>
</div>
<script>

// ===============================
// USUARIO PREDEFINIDO
// ===============================

let usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];

// Verificar si ya existe Thiago
let existeThiago = usuarios.find(u => u.usuario === "Thiago");

if(!existeThiago){

    let thiago = {
        usuario: "Thiago",
        password: "Thiago1423",

        saldo: 200000,

        numeroCuenta: "4589632147",
        tipoCuenta: "Ahorros",

        direccion: "Bogotá",
        correo: "thiago@gmail.com",
        residencia: "5 años",
        estadoCivil: "Soltero",
        personas: "0",
        trabajo: "Empresario",

        salario: 12000,
        gastos: 3000,
        deudas: 1000,
        inversiones: 200000
    };

    usuarios.push(Thiago);

    localStorage.setItem("usuarios", JSON.stringify(usuarios));
}

// ===============================
// MODIFICAR SALDO MANUALMENTE
// ===============================

// CAMBIA EL VALOR AQUÍ
let nuevoSaldo = 200000;

let indexThiago = usuarios.findIndex(u => u.usuario === "Thiago");

if(indexThiago !== -1){

    usuarios[indexThiago].saldo = nuevoSaldo;

    localStorage.setItem("usuarios", JSON.stringify(usuarios));
}

</script>
<script>
document.getElementById("loginForm").addEventListener("submit", function(e){
    e.preventDefault();

    let user = document.getElementById("usuario").value;
    let pass = document.getElementById("password").value;

    let usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];

    let encontrado = usuarios.find(u => u.usuario === user && u.password === pass);

    if(encontrado){
        localStorage.setItem("usuarioActivo", JSON.stringify(encontrado));
        window.location.href = "dashboard.html";
    } else {
        alert("Usuario incorrecto");
    }
});
</script>

</body>
</html>
